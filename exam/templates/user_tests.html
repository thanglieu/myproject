<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bài kiểm tra của {{ author.username }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px 0 40px;
        }

        h1 {
            color: #1f3a5d;
            margin-bottom: 18px;
        }

        ul {
            list-style: none;
            padding-left: 0;
            margin-top: 20px;
        }

        li {
            margin-bottom: 18px;
            padding: 18px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.05);
        }

        strong {
            color: #1f3a5d;
        }

        p {
            margin-bottom: 14px;
        }

        a {
            color: #1aae1c;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #3f9a3e;
        }
    </style>
</head>
<body>
    <h1>Bài kiểm tra của {{ author.username }}</h1>

    {% if tests %}
        <ul>
            {% for test in tests %}
                <li>
                    <strong>{{ test.title }}</strong> (Số lượng câu hỏi: {{ test.quantity }})
                    <br>
                    <a href="{% url 'exam:take_test' test.id %}">Làm bài</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Người dùng này chưa tạo bài kiểm tra nào.</p>
    {% endif %}

    <p><a href="{% url 'exam:search_tests' %}">Quay lại tìm kiếm</a></p>
</body>
</html>
