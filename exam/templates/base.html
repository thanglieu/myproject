<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Exam App{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px 0 40px;
        }

        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        h1, h2, h3, h4 {
            color: #1f3a5d;
            margin-bottom: 18px;
            line-height: 1.2;
        }

        p, label, ul, ol, li, div {
            line-height: 1.6;
        }

        a {
            color: #1aae1c;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #3f9a3e;
        }

        form {
            background: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        fieldset {
            background: #f8fff9;
            border: 1px solid rgba(76, 175, 80, 0.18);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
        }

        legend {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d8dee4;
            background: #fbfdff;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4caf50;
        }

        button,
        input[type="submit"],
        input[type="button"] {
            background: #4caf50;
            color: #ffffff;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        input[type="button"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(76, 175, 80, 0.18);
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin-bottom: 16px;
        }

        li > div,
        li > p {
            background: #ffffff;
            padding: 16px 18px;
            border-radius: 14px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.05);
            margin-bottom: 10px;
        }

        .error-message,
        div[style*="color:red"] {
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #c62828;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .page-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .page-content {
            display: grid;
            gap: 20px;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>{% block title %}Exam App{% endblock %}</h1>
        </div>
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
